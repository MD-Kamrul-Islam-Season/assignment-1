<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEVCONF</title>
    <!-- Google font inter link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Css file link -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <!-- Navbar starts -->
      <nav>
        <img src="./assets/logo.png" alt="logo image" />
        <ul class="nav-item-container">
          <li class="nav-item"><a class="nav-link" href="">Speakers</a></li>
          <li class="nav-item"><a class="nav-link" href="">Schedule</a></li>
          <li class="nav-item"><a class="nav-link" href="">Tracks</a></li>
          <li class="nav-item"><a class="nav-link" href="">Venue</a></li>
          <li class="nav-item"><a class="nav-link" href="">Blog</a></li>
        </ul>
        <button class="btn-1">Register Now</button>
      </nav>
      <!-- Navbar ends -->
      <!-- Banner section starts -->
      <section class="banner">
        <div class="banner-text-container">
          <h1 class="banner-heading">Code. Connect. Create</h1>
          <p class="banner-text">
            Join 4,000+ engineers, founders, and builders at the premier
            developer conference of 2026. Three days of cutting-edge talks,
            hands-on workshops, and meaningful connections.
          </p>
        </div>
        <div class="btn-container">
          <button class="btn-2">Register Now</button>
        </div>
      </section>
      <!-- Banner section ends -->
    </header>
    <main></main>
    <footer></footer>
  </body>
</html>
